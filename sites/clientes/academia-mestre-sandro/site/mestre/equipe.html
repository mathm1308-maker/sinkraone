<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipe | Mestre Sandro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: #070707; color: #fff; font-family: "Barlow", Arial, sans-serif; }
    a { color: inherit; text-decoration: none; }
    .page { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    header { border-bottom: 1px solid rgba(255,255,255,.12); background: #080808; }
    nav { width: min(1120px, calc(100% - 32px)); min-height: 78px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 18px; }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 900; text-transform: uppercase; }
    .brand img { width: 54px; height: 54px; object-fit: contain; border-radius: 8px; background: #fff; padding: 5px; }
    .brand span { color: #d20f1a; }
    .back { display: inline-flex; align-items: center; justify-content: center; min-height: 44px; padding: 0 16px; border: 1px solid rgba(255,255,255,.22); border-radius: 8px; font-size: 13px; font-weight: 900; text-transform: uppercase; }
    main { width: min(1120px, calc(100% - 32px)); margin: 0 auto; padding: 92px 0; display: grid; align-content: center; }
    .label { color: #d20f1a; font-size: 13px; font-weight: 900; letter-spacing: .16em; text-transform: uppercase; }
    h1 { margin-top: 18px; font-family: "Bebas Neue", Impact, sans-serif; font-size: clamp(70px, 14vw, 150px); font-weight: 400; line-height: .82; text-transform: uppercase; }
    p { max-width: 720px; margin-top: 22px; color: #c8c8c8; font-size: 21px; line-height: 1.55; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 34px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; min-height: 48px; padding: 0 20px; border-radius: 8px; background: #d20f1a; color: #fff; font-weight: 900; text-transform: uppercase; }
    .btn.secondary { background: transparent; border: 1px solid rgba(255,255,255,.24); }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <nav>
        <a class="brand" href="../index.html"><img src="../assets/images/tuff-team-logo.png" alt="Tuff Team"><strong>Mestre <span>Sandro</span></strong></a>
        <a class="back" href="../index.html#mestre">Voltar</a>
      </nav>
    </header>
    <main>
      <div class="label">O mestre</div>
      <h1>Equipe</h1>
      <p>Pagina interna inicial para apresentar a Tuff Team, alunos, professores, competidores e a cultura da academia.</p>
      <div class="actions">
        <a class="btn" href="../index.html#contato">Aula experimental</a>
        <a class="btn secondary" href="../index.html#mestre">Ver o mestre</a>
      </div>
    </main>
  </div>
</body>
</html>
